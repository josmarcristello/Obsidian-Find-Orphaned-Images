name: Release (manual bump)

# Triggered by hand from the Actions tab: pick a bump type (or type an explicit
# version), and this bumps package.json + manifest.json + versions.json, commits them,
# tags, builds, and publishes — so the tag and every manifest always agree.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semver bump (ignored if an explicit version is provided)"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      explicit_version:
        description: "Explicit version, e.g. 1.3.0 (optional; overrides the bump above)"
        type: string
        required: false

# Allow the workflow to push the bump commit + tag back to the branch.
# NOTE: the repo must also allow this — Settings → Actions → General →
# Workflow permissions → "Read and write permissions".
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Bump version (package.json, manifest.json, versions.json)
        id: bump
        run: |
          ARG="${{ inputs.explicit_version }}"
          if [ -z "$ARG" ]; then ARG="${{ inputs.release_type }}"; fi
          echo "Bumping with argument: $ARG"
          # Bump package.json only (no git, no lifecycle scripts)...
          npm version "$ARG" --no-git-tag-version --ignore-scripts --allow-same-version >/dev/null
          NEW=$(node -p "require('./package.json').version")
          # ...then sync manifest.json + versions.json from the new version.
          npm_package_version="$NEW" node version-bump.mjs
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Released version: $NEW"

      - name: Build plugin
        run: pnpm run build

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json versions.json
          git commit -m "Release $VERSION"
          git tag "$VERSION"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "refs/tags/$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          body: |
            ## What's New
            - This release contains updates and improvements for the Find Orphaned Images plugin.
            - Detailed changelog can be found in the repository.
          files: |
            main.js
            manifest.json
            styles.css
